name: deploy server 
on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code 
              uses: actions/checkout@v4

            - name: ssh to prod server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "Starting Deployment"
                  echo "Installing required packages & folders"
                  sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                  sudo usermod -aG docker $USER
                  mkdir -p devops


            - name: copy the docker file 
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~devops 
          

            - name: ssh to prod server & run the app 
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "runnung App "
                  export DOCKERHUB_USER=${{ vars.DOCKER_USER }}
                  export DOCKER_TAG=${{ github.sha }}
                  echo ${{ secrets.DOCKER_TOKEN }} | docker login - u ${{ secrets.DOCKER_USER}} --password-std
                  cd ~/devops && ~devops && docker compose down && docker compose up -d --build --force-recreate --pull always
