name: docker build & push 

on:
    push:
        branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:

            - name: checkout code 
              uses: actions/checkout@v4

            - name: Login to docker hub
              uses: docker/login-action@v2
              with:
                username: ${{ vars.DOCKER_USER }}
                password: ${{ secrets.DOCKER_TOKEN }}