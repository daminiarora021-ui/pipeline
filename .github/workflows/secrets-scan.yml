name: secret scan
on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps: 
            - name: checkout code 
              uses: actions/checkout@v4

            - name : Run Gitleak Scanner 
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

