<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps — Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e0e0e0;
        }
        .container { text-align: center; padding: 2rem; max-width: 720px; width: 100%; }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            margin: 1rem 0 2.5rem;
            padding: 0.4rem 1.2rem;
            border: 1px solid #7b2ff7;
            border-radius: 999px;
            font-size: 0.9rem;
            color: #c4b5fd;
            letter-spacing: 0.05em;
        }

        /* ── Pipeline ── */
        .pipeline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            flex-wrap: nowrap;
            margin-bottom: 2.5rem;
        }
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .stage-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            border: 2px solid;
            position: relative;
        }
        .stage-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
        }
        .stage-status {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        /* colours per stage */
        .lint   .stage-icon { background: rgba(251,191,36,0.12);  border-color: #fbbf24; color: #fbbf24; }
        .test   .stage-icon { background: rgba(59,130,246,0.12);  border-color: #3b82f6; color: #3b82f6; }
        .build  .stage-icon { background: rgba(168,85,247,0.12);  border-color: #a855f7; color: #a855f7; }
        .deploy .stage-icon { background: rgba(34,197,94,0.12);   border-color: #22c55e; color: #22c55e; }

        .lint   .stage-status { color: #fbbf24; }
        .test   .stage-status { color: #3b82f6; }
        .build  .stage-status { color: #a855f7; }
        .deploy .stage-status { color: #22c55e; }

        /* animated connector arrow */
        .arrow {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, #7b2ff7, #00d2ff);
            position: relative;
            margin: 0 6px;
            margin-bottom: 2rem;
        }
        .arrow::after {
            content: "";
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            border: 6px solid transparent;
            border-left-color: #00d2ff;
        }

        /* pulse on deploy icon */
        .deploy .stage-icon::after {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid #22c55e;
            animation: pulse 1.8s ease-out infinite;
            opacity: 0;
        }
        @keyframes pulse {
            0%   { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* ── Info cards ── */
        .cards { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.2rem 1.6rem;
            min-width: 140px;
            flex: 1;
        }
        .card span { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: #9ca3af; margin-bottom: 0.4rem; }
        .card strong { font-size: 1.2rem; color: #f9fafb; }

        .footer {
            margin-top: 2rem;
            font-size: 0.72rem;
            color: #4b5563;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<div class="container">

    <h1>DevOps CI/CD pipeline</h1>
    <div class="badge">DevSecOps edition</div>

    <!-- CI/CD Pipeline -->
    <div class="pipeline">

        <div class="stage lint">
            <div class="stage-icon">⚡</div>
            <div class="stage-label">Lint</div>
            <div class="stage-status">Passed</div>
        </div>

        <div class="arrow"></div>

        <div class="stage test">
            <div class="stage-icon">🧪</div>
            <div class="stage-label">Test</div>
            <div class="stage-status">Passed</div>
        </div>

        <div class="arrow"></div>

        <div class="stage build">
            <div class="stage-icon">📦</div>
            <div class="stage-label">Build</div>
            <div class="stage-status">Success</div>
        </div>

        <div class="arrow"></div>

        <div class="stage deploy">
            <div class="stage-icon">🚀</div>
            <div class="stage-label">Deploy</div>
            <div class="stage-status">Live</div>
        </div>

    </div>

    <!-- Stack cards -->
    <div class="cards">
        <div class="card">
            <span>Framework</span>
            <strong>Flask 3.1</strong>
        </div>
        <div class="card">
            <span>Runtime</span>
            <strong>Python 3.14</strong>
        </div>
        <div class="card">
            <span>Deploy</span>
            <strong>AWS ECS</strong>
        </div>
    </div>

    <p class="footer">Shipped via GitHub Actions · All checks passed</p>

</div>
</body>
</html>
